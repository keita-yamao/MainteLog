<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Log</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Style CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="vh-100 d-flex flex-column overflow-hidden">
    <!-- ヘッダー -->
    <header class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">MaineteLog</a>
            <button class="navbar-toggler d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </header>
    <!-- メインコンテンツ -->
    <div class="container-fluid flex-grow-1 overflow-hidden">
        <div class="row h-100">
                <!-- サイドバーナビゲーション -->
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 bg-light sidebar offcanvas-md offcanvas-end h-100 overflow-y-auto">
                <div class="offcanvas-header d-md-none">
                    <h5 class="offcanvas-title">メニュー</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu"></button>
                </div>
                <div class="pt-3">
                    <ul class="nav flex-column" id="sidebar-list"></ul>
                </div>
            </nav>
            <!-- 機能画面 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 h-100 overflow-y-auto" id="main-content">
                <div class="d-flex flex-column justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom sticky-top bg-white" id="main-container">
                    <h1 class="h2" id="main-title"></h1>
                </div>
            </main>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- サイドバーの中身を読み込み -->
    <script src="js/sidebar.js"></script>
    <!-- メーカー情報の読み込み -->
    <script defer src="js/makers.js"></script>
</body>
</html>
